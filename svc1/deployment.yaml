apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc1-deployment
  labels:
    app: svc1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc1
  template:
    metadata:
      labels:
        app: svc1
    spec:
      containers:
      - name: svc1-app
        image: nazmulcs42/svc1:v1.0.1
        ports:
        - containerPort: 3000
          
---
apiVersion: v1
kind: Service
metadata:
  name: svc1-service
spec:
  selector:
    app: svc1
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: LoadBalancer

